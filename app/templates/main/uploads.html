{% extends 'base.html' %}
{% block app_content %}
<title>File Upload</title>
<body>
<h1>File Upload</h1>
<form method="POST" action="" enctype="multipart/form-data">
    <p>Allowed filetypes: pdf<input type="file" name="file"></p>
    <p><input type="submit" value="Submit" name="filesubmit"></p>
{% for f in ups %}
    <p><a href="{{url_for('main.files',path=username+'/'+f[0])}}">{{ f[0] }}</a> submitted on {{ f[1] }}: <button type="submit" value={{f[0]}} name="Delete">Delete</button></p>
{% endfor %}
</form>
{% endblock %}
